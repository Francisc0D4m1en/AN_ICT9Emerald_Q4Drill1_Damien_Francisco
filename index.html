<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
	<style>
  	body{
		font-family: 'Lexend', sans-serif;
        text-align: center;
        position: absolute;
		top: 39%;
		left: 50%;
		transform: translate(-50%, -50%);

  	}
    div{
        background-color: #f2f2f2;
        padding: 20px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
    }
    input,select,button{
        font-family: 'Lexend', sans-serif;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;

    }
    #consumpt{
        width: 45%;
    }
    </style>
</head>
<body>
    <div>
    <h1>Energy Consumption Classifier</h1>
    <label for="consumpt">Average Electric Consumption (kWh):</label><br>
    <input type="number" id="consumpt" min="1" max="100" placeholder="Enter your kWh">
    <br>
    <br>
    <button onclick="calculateGrade()">Calculate Classification</button>
    <br>
    <br>
    <h3>Classification Table</h3>
    <img src="Table.png" alt="Table.png" width="90%" height="90%">
    </div>
    
    <script>
        function calculateGrade() {
            let kwh = parseFloat(document.getElementById("consumpt").value);


        if (kwh < 0) {
            alert("Invalid input! Please enter a positive value.");
            return;
        } else if (kwh <= 100 && kwh >= 0) {
           alert("Average Electric Consumption (kWh): Lifeline\nYou consume a very low amount of electricity, which may indicate that you are eligible for lifeline assistance.");
        } else if (kwh <= 200 && kwh >= 101) {
            alert("Average Electric Consumption (kWh): Low\nYou consume a relatively low amount of electricity.");
        } else if (kwh <= 300 && kwh >= 201) {
            alert("Average Electric Consumption (kWh): Normal\nYour electric consumption is within the average range.");
        } else if (kwh <= 500 && kwh >= 301) {
            alert("Average Electric Consumption (kWh): High\nYou consume a significant amount of electricity.");
        } else {
            alert("Average Electric Consumption (kWh): Very High\nYou consume an excessive amount of electricity.");
        }
        }
    </script>
    
</body>
</html>
